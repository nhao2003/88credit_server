name: Node.js CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [16.x, 18.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node }}
        registry-url: https://registry.yarnpkg.com/

    - name: Install dependencies
      run: |
        yarn install

    - name: Run tests
      run: |
        yarn test
